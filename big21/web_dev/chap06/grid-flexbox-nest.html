<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Flexbox 중첩</title>
    <style>
        /* Grid : 전체 카드 갤러리 격자 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            background-color: #f8f9fa;
        }
        .card {
            display: flex;
            flex-direction: column; /* 세로로 쌓기 */
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;   /* 카드 밖으로 넘어가는 거 안 보이게 해라 */
            box-shadow: 0 2px 8px rgba(0,0,0,0,08);
        }
        .card-image {
            width: 100%;
            height: 140px;
            background-color: #a8d8ea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .card-body {
            padding: 16px;
            flex: 1;    /* 남은 공간을 채워 카드 높이를 일정하게 유지 */
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .card-title {
            font-weight: bold;
            font-size: 16px;
            color: #222;
        }
        .card-desc {
            font-size: 13px;
            color: #666;
            flex: 1;
        }
        .card-btn {
            display: block;     /* a 태그는 inline 엘리먼트라 */
            background-color: #2c7be5;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <!-- gallery div start -->
    <div class="gallery">
        <div class="card">  <!-- card start -->
            <div class="card-image">image</div>
            <div class="card-body">
                <p class="card-title">카드 제목 A</p>
                <p class="card-desc">짧은 설명</p>
                <a href="#" class="card-btn">자세히 보기</a>
            </div>
        </div>  <!-- card end -->
        <div class="card">
            <div class="card-image">image</div>
            <div class="card-body">
                <p class="card-title">카드 제목 B</p>
                <p class="card-desc">짧은 설명</p>
                <a href="#" class="card-btn">자세히 보기</a>
            </div>            
        </div>
        <div class="card">
            <div class="card-image">image</div>
            <div class="card-body">
                <p class="card-title">카드 제목 C</p>
                <p class="card-desc">짧은 설명</p>
                <a href="#" class="card-btn">자세히 보기</a>
            </div>
        </div>

    <!-- gallery div end -->
    </div>
</body>
</html>
