<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CSS 변수 기초</title>
<style>
:root {
  --color-primary: #3b82f6;
  --color-primary-dk: #2563eb;
  --color-danger: #ef4444;
  --color-success: #10b981;
  --color-text: #1e293b;
  --color-bg: #f8fafc;
  --color-surface: #ffffff;
  --color-border: #e2e8f0;
  --spacing-sm: 8px; --spacing-md: 16px; --spacing-lg: 24px;
  --radius-sm: 4px; --radius-md: 8px; --radius-full: 9999px;
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
}
body { background-color: var(--color-bg); color: var(--color-text); padding: var(--spacing-lg); }
.card {
  background-color: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: var(--spacing-lg);
  box-shadow: var(--shadow-md); max-width: 320px;
}
.btn {
  display: inline-block; padding: var(--spacing-sm) var(--spacing-md);
  background-color: var(--color-primary); color: #fff;
  border: none; border-radius: var(--radius-sm); cursor: pointer;
  transition: background-color 0.2s ease;
}
.btn:hover { background-color: var(--color-primary-dk); }
.btn-danger { background-color: var(--color-danger); }
.badge {
  display: inline-block; padding: 2px var(--spacing-sm);
  background-color: var(--color-success); color: #fff;
  border-radius: var(--radius-full); font-size: 0.75rem;
}
</style>
</head>
<body>
<div class="card">
  <h2>CSS 변수 예제</h2>
  <span class="badge">신규</span><br><br>
  <button class="btn">기본 버튼</button>
  <button class="btn btn-danger">삭제</button>
</div>
</body>
</html>
