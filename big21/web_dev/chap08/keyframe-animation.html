<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>keyframes 애니메이션</title>
<style>
.spinner {
  width: 48px; height: 48px;
  border: 5px solid #e2e8f0; border-top-color: #3b82f6;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.pulse {
  width: 16px; height: 16px;
  background-color: #10b981; border-radius: 50%;
  margin-top: 24px;
  animation: pulse-opacity 1.2s ease-in-out infinite alternate;
}
@keyframes pulse-opacity {
  from { opacity: 1; transform: scale(1); }
  to { opacity: 0.3; transform: scale(0.8); }
}
</style>
</head>
<body>
<div class="spinner" role="status" aria-label="로딩 중"></div>
<div class="pulse"></div>
</body>
</html>
