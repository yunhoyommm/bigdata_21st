<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- viewport 메타 태그를 포함해야 모바일에서 올바르게 표시됩니다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뷰포트 예제</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 16px;
            background-color: #f0f4ff;

        }
        .box {
            background-color: #4f46e5;
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            
        }
    </style>
</head>
<body>
    <div class="box">
        이 박스는 화면 너비에 맞춰 표시됩니다.
    </div>
    
</body>
</html>
