<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기본 선택자</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <h2>타입 선택자로 스타일 적용</h2> <!--블록 엘리먼트-->
    <p>이 문단은 타입 선택자(p)로 색이 지정됩니다.</p>  <!--블록 엘리먼트-->

    <p class="highlight">클래스 선택자(.highlight)로 강조된 문단입니다.</p>
    <p class="highlight">같은 클래스는 여러 요소에 쓸 수 있다.</p>
    <p id="intro">아이디 선택자(#intro)로 지정된 특별한 문단.</p>
</body>
</html>
